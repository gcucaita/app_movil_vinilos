name: Android CI

on:
  push:
    branches: [ "main", "develop", "ci-test" ]
    tags:
      - 'v.*.*.*'   # trigger con tags en formato v.x.x.x
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  test:
    name: Correr pruebas unitarias
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Dar permisos a Gradle
        run: chmod +x ./gradlew

      - name: Correr pruebas unitarias
        run: ./gradlew :app:testDebugUnitTest

      - name: Publicar reporte de pruebas
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-report
          path: app/build/reports/tests/

  build:
    name: Generar APK
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Dar permisos a Gradle
        run: chmod +x ./gradlew

      - name: Generar APK debug
        run: ./gradlew :app:assembleDebug

      - name: Subir APK como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

  release:
    name: Crear Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v.')   # solo si es un tag en formato v.x.x.x
    permissions:
      contents: write

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Dar permisos a Gradle
        run: chmod +x ./gradlew

      - name: Generar APK debug
        run: ./gradlew :app:assembleDebug

      - name: Crear Release y subir APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          files: app/build/outputs/apk/debug/app-debug.apk