name: Android CI

on:
  push:
    branches: [ "main", "develop", "release", "ci-test" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  test:
    name: Correr pruebas unitarias
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Dar permisos a Gradle
        run: chmod +x ./gradlew

      - name: Correr pruebas unitarias
        run: ./gradlew :app:testDebugUnitTest

      - name: Publicar reporte de pruebas
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-report
          path: app/build/reports/tests/

  build:
    name: Generar APK
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Dar permisos a Gradle
        run: chmod +x ./gradlew

      - name: Generar APK debug
        run: ./gradlew :app:assembleDebug

      - name: Subir APK como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

  deploy:
    name: Deploy a main y crear Release
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/release'
    permissions:
      contents: write

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Dar permisos a Gradle
        run: chmod +x ./gradlew

      - name: Obtener versión del build.gradle
        id: version
        run: |
          VERSION=$(grep 'versionName' app/build.gradle.kts | grep -o '".*"' | tr -d '"')
          echo "version=v.$VERSION" >> $GITHUB_OUTPUT
          echo "Versión detectada: v.$VERSION"

      - name: Configurar Git
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      - name: Merge release → main
        run: |
          git checkout main
          git merge release --no-ff -m "release: merge ${{ steps.version.outputs.version }} into main"
          git push origin main

      - name: Crear tag
        run: |
          git tag ${{ steps.version.outputs.version }}
          git push origin ${{ steps.version.outputs.version }}

      - name: Generar APK para Release
        run: ./gradlew :app:assembleDebug

      - name: Renombrar APK
        run: |
          mv app/build/outputs/apk/debug/app-debug.apk \
             app/build/outputs/apk/debug/vinilos-app-${{ steps.version.outputs.version }}.apk

      - name: Crear Release y subir APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: Release ${{ steps.version.outputs.version }}
          files: app/build/outputs/apk/debug/vinilos-app-${{ steps.version.outputs.version }}.apk
