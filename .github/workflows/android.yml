name: Android CI

# Cuándo se ejecuta el pipeline
on:
  push:
    branches: [ "main", "develop", "ci-test" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    name: Correr pruebas unitarias
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Dar permisos a Gradle
        run: chmod +x ./gradlew

      - name: Correr pruebas unitarias
        run: ./gradlew :app:testDebugUnitTest

      - name: Publicar reporte de pruebas
        uses: actions/upload-artifact@v4
        if: always()   # sube el reporte aunque fallen los tests
        with:
          name: test-report
          path: app/build/reports/tests/

  build:
    name: Generar APK
    runs-on: ubuntu-latest
    needs: test   # solo corre si los tests pasan

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Dar permisos a Gradle
        run: chmod +x ./gradlew

      - name: Generar APK debug
        run: ./gradlew :app:assembleDebug

      - name: Subir APK como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk